name: flathub_catalog
description: Flathub catalog browser — example Flutter app using the appstream package with Drift.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  appstream:
    path: ../..
  cached_network_image: ^3.4.1
  drift: ^2.22.0
  http: ^1.2.0
  path: ^1.9.0
  path_provider: ^2.1.0
  sqlite3: ^2.4.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true