name: appstream_dart
description: >-
  High-performance AppStream XML parser with C++23 FFI bridge.
  Streams catalog metadata into SQLite with Drift ORM and FTS5 search.
version: 0.3.0
repository: https://github.com/meta-flutter/appstream
issue_tracker: https://github.com/meta-flutter/appstream/issues
topics:
  - appstream
  - flathub
  - linux
  - ffi
  - sqlite

platforms:
  linux:

# Exposed via `dart pub global activate appstream_dart`. After activation:
#   appstream_dart        — download + parse Flathub catalog (bin/main.dart)
#   appstream_dart_query  — interactive query tool       (bin/query.dart)
executables:
  appstream_dart: main
  appstream_dart_query: query

environment:
  sdk: ^3.10.0

dependencies:
  drift: ^2.22.0
  code_assets: ^1.0.0
  ffi: ^2.1.0
  hooks: ^1.0.2
  http: ^1.2.0
  path: ^1.9.0
  sqlite3: ^3.3.1

dev_dependencies:
  build_runner: ^2.4.0
  drift_dev: ^2.22.0
  lints: ^6.1.0
  test: ^1.25.8
